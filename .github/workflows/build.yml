name: Build and Release

permissions:
  contents: write

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-qt6-base
            mingw-w64-ucrt-x86_64-fontconfig
            zip
            unzip

      - name: Configure
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          ninja

      - name: Deploy Qt DLLs
        run: |
          cd build
          windeployqt HandWrite.exe --no-translations --no-system-d3d-compiler

      - name: Copy runtime DLLs
        run: |
          cd build
          cp /ucrt64/bin/*.dll . 2>/dev/null || true
          cp -r ../ttf_library . 2>/dev/null || true
          echo "[Paths]" > qt.conf
          echo "Prefix = ." >> qt.conf
          echo "Plugins = plugins" >> qt.conf

      - name: Package release
        shell: pwsh
        run: |
          cd build
          Compress-Archive -Path HandWrite.exe,handwrite-cli.exe,qt.conf,*.dll,ttf_library,platforms,imageformats,styles,tls -CompressionLevel Optimal -DestinationPath ../HandWrite-v2.4.2-windows-x64.zip -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-Windows
          path: |
            build/HandWrite.exe
            build/handwrite-cli.exe
            build/qt.conf
            build/*.dll
            build/platforms/
            build/imageformats/
            build/styles/
            build/tls/

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-Windows-Zip
          path: HandWrite-v2.4.2-windows-x64.zip

      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: HandWrite v2.4.2
          tag_name: v2.4.2
          body: |
            ## HandWrite v2.4.2

            ### New Features
            - 6 paper textures (horizontal line, grid, tianzige, composition, dot grid)
            - Ink bleed, stroke width variation, strikethrough simulation
            - Real-time auto-preview with debounce timer
            - PDF export
            - Multi-preset management (save/load/delete)
            - Paragraph indent & spacing
            - Markdown light parsing (# headings, ~~strikethrough~~, --- separator)
            - Font mixing, background image overlay
            - CLI mode (handwrite-cli)
            - Dynamic UI

            ### Bug Fixes
            - Use-after-free, null pointer crash, font path mismatch
            - Paper template selector ordering
            - Character override, perturbed font spacing, line spacing consistency
            - Code duplication, input validation, config parsing
          files: HandWrite-v2.4.2-windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
